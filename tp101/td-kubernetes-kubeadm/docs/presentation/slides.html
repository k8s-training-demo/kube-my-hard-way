<h2 id="native-sidecars---le-probl%C3%A8me-r%C3%A9solu">Native Sidecars - Le problème résolu</h2>
<p><strong>Avant K8s 1.28</strong>, les sidecars étaient des containers réguliers :</p>
<ul>
<li>Aucune garantie d'ordre de démarrage</li>
<li>Une seule <code>restartPolicy</code> pour tous les containers</li>
<li>Le sidecar pouvait démarrer <strong>après</strong> l'application</li>
<li>Contournements complexes nécessaires (sleep, scripts)</li>
</ul>
<p><strong>Solution K8s 1.28+ (GA en 1.29)</strong> : Init containers avec <code>restartPolicy: Always</code></p>
</section>

<h2 id="native-sidecars---cycle-de-vie">Native Sidecars - Cycle de vie</h2>
<ol>
<li><strong>Init containers classiques</strong> s'exécutent séquentiellement</li>
<li><strong>Sidecar démarre</strong> mais <strong>ne bloque pas</strong> la suite</li>
<li><strong>Containers réguliers</strong> démarrent en parallèle</li>
<li><strong>Sidecar reste actif</strong> pendant toute la vie du Pod</li>
<li><strong>À l'arrêt</strong> : containers réguliers d'abord, sidecars ensuite</li>
</ol>
<p><strong>Cas d'usage :</strong> Istio/Envoy proxy, Fluent-bit, Vault Agent, OpenTelemetry</p>

<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># Vérifier le kernel</span>

kubectl -n kube-system edit cm kube-proxy
<span class="hljs-comment"># mode: nftables</span>

<span class="hljs-comment"># Redémarrer kube-proxy</span>

</code></pre>

<h2 id="volume-group-snapshots---le-probl%C3%A8me">Volume Group Snapshots - Le problème</h2>
<p><strong>Avant:</strong> Snapshots individuels = incohérences possibles</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>t=0: Snapshot volume données  ✓
t=1: Write transaction...
t=2: Snapshot volume WAL      ✓  ← Désynchronisé!
</code></pre>
<p><strong>Après:</strong> Snapshots groupés = cohérence garantie</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>t=0: Snapshot [données + WAL + logs] atomique ✓
</code></pre>
</section>

<p><strong>Filtrage efficace côté serveur pour vos CRDs</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-yaml"><span class="hljs-attr">apiVersion:</span> <span class="hljs-string">apiextensions.k8s.io/v1</span>

  <span class="hljs-attr">selectableFields:</span>
  <span class="hljs-bullet">-</span> <span class="hljs-attr">jsonPath:</span> <span class="hljs-string">.spec.environment</span>  <span class="hljs-comment"># Champ filtrable</span>
  <span class="hljs-bullet">-</span> <span class="hljs-attr">jsonPath:</span> <span class="hljs-string">.status.phase</span>
</code></pre>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># Avant: Filtre client (lent, coûteux)</span>

<span class="hljs-comment"># Après: Filtre serveur (rapide, efficace)</span>
kubectl get myapps --field-selector spec.environment=prod
</code></pre>

<h3 id="pourquoi-le-swap-est-important">Pourquoi le swap est important ?</h3>
<p><strong>Avantages:</strong></p>
<ul>
<li>Réduction des coûts (moins de RAM nécessaire)</li>
<li>Évite les OOMKills pour pics temporaires</li>
<li>Meilleure utilisation des ressources</li>
</ul>
<p><strong>Inconvénients:</strong></p>
<ul>
<li>Impact sur les performances</li>
<li>Latence accrue pour certaines workloads</li>
</ul>

<h2 id="swap---configuration-des-n%C5%93uds">Swap - Configuration des nœuds</h2>
<h3 id="activation-du-swap-sur-ubuntu">Activation du swap sur Ubuntu</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># 1. Créer un fichier swap</span>
<span class="hljs-built_in">sudo</span> fallocate -l 4G /swapfile
<span class="hljs-built_in">sudo</span> <span class="hljs-built_in">chmod</span> 600 /swapfile
<span class="hljs-built_in">sudo</span> mkswap /swapfile
<span class="hljs-built_in">sudo</span> swapon /swapfile

<span class="hljs-comment"># 2. Persister dans /etc/fstab</span>
<span class="hljs-built_in">echo</span> <span class="hljs-string">&#x27;/swapfile none swap sw 0 0&#x27;</span> | <span class="hljs-built_in">sudo</span> <span class="hljs-built_in">tee</span> -a /etc/fstab

<span class="hljs-comment"># 3. Configurer kubelet</span>
<span class="hljs-built_in">cat</span> &lt;&lt;<span class="hljs-string">EOF | sudo tee /var/lib/kubelet/config.yaml
apiVersion: kubelet.config.k8s.io/v1beta1
kind: KubeletConfiguration
memorySwap:
  swapBehavior: LimitedSwap
failSwapOn: false
EOF</span>
</code></pre>

<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># Vérifier l&#x27;utilisation du swap sur le nœud</span>
free -h
swapon --show

<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-yaml"><span class="hljs-attr">apiVersion:</span> <span class="hljs-string">v1</span>
<span class="hljs-attr">kind:</span> <span class="hljs-string">Pod</span>

  <span class="hljs-attr">name:</span> <span class="hljs-string">secure-pod</span>
<span class="hljs-attr">spec:</span>
  <span class="hljs-attr">hostUsers:</span> <span class="hljs-literal">false</span>  <span class="hljs-comment"># Active user namespaces</span>
  <span class="hljs-attr">containers:</span>
  <span class="hljs-bullet">-</span> <span class="hljs-attr">name:</span> <span class="hljs-string">app</span>
    <span class="hljs-attr">securityContext:</span>
      <span class="hljs-attr">runAsUser:</span> <span class="hljs-number">1000</span>
      <span class="hljs-attr">runAsGroup:</span> <span class="hljs-number">3000</span>

<h3 id="ordre-de-mise-%C3%A0-jour">Ordre de mise à jour</h3>
<ol>
<li>
<p><strong>Control plane</strong> (1 version à la fois)</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">kubeadm upgrade plan
kubeadm upgrade apply v1.32.0
</code></pre>
</li>
<li>
<p><strong>Kubelet sur master</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">apt-mark unhold kubelet kubectl
apt-get update &amp;&amp; apt-get install -y kubelet=1.32.0-* kubectl=1.32.0-*
apt-mark hold kubelet kubectl
systemctl daemon-reload
systemctl restart kubelet
</code></pre>
</li>
<li>
<p><strong>Workers</strong> (un par un)</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">kubectl drain &lt;node&gt;
<span class="hljs-comment"># Upgrade kubelet</span>
kubectl uncordon &lt;node&gt;
</code></pre>
</li>
</ol>
</section>

<p><strong>Q: Dois-je activer le swap en production ?</strong><br />

<p><strong>Q: À quelle fréquence upgrader ?</strong><br />
R: Au minimum tous les 12 mois pour rester dans la fenêtre de support (14 mois). Idéalement suivre N-1 ou N-2.</p>
<p><strong>Q: Comment tester les features alpha ?</strong><br />
R: Environnement de dev isolé, feature gates activées, ne JAMAIS en production.</p>

<h2 id="questions-attendues---pr%C3%A9requis">Questions attendues - Prérequis</h2>
<p><strong>Q: Pourquoi désactiver le swap ?</strong></p>
<blockquote>
<p>R: Kubernetes nécessite un contrôle précis de la mémoire pour le scheduling. Le swap introduit des performances imprévisibles.</p>
</blockquote>
<p><strong>Q: Différence entre containerd et Docker ?</strong></p>
<blockquote>
<p>R: containerd est le runtime de conteneurs, Docker est un ensemble d'outils incluant containerd. Kubernetes utilise directement containerd via CRI.</p>
</blockquote>
</section>

<p><strong>Q: Pourquoi ne pas toujours utiliser NoExecute ?</strong></p>
<blockquote>

<p><strong>Q: Comment fonctionne l'operator 'Exists' ?</strong></p>
<blockquote>
<p>R: C'est un wildcard qui tolère n'importe quelle valeur pour la clé, ou toutes les clés si aucune n'est spécifiée.</p>

<h2 id="q1-architecture-du-control-plane">Q1: Architecture du Control Plane</h2>
<h3 id="r%C3%A9ponse-attendue">Réponse attendue</h3>
<ul>
<li><strong>API Server:</strong> Point d'entrée unique, validation, authentification</li>
<li><strong>Scheduler:</strong> Placement des pods sur les nœuds</li>
<li><strong>Controller Manager:</strong> Boucles de contrôle (ReplicaSet, Node, etc.)</li>
<li><strong>etcd:</strong> Base de données distribuée, état du cluster</li>
</ul>
<p><strong>Point bonus:</strong> Communication via API server uniquement</p>
</section>
</foreignObject></svg><svg data-marpit-svg="" viewBox="0 0 1280 720"><foreignObject width="1280" height="720"><section id="129" data-paginate="true" data-theme="default" data-style="section {

<h2 id="q2-cni-overlay-vs-avanc%C3%A9">Q2: CNI Overlay vs Avancé</h2>
<h3 id="r%C3%A9ponse-attendue-1">Réponse attendue</h3>
<ul>
<li>
<p><strong>Overlay (Flannel):</strong></p>
<ul>
<li>Encapsulation VXLAN</li>
<li>Simple</li>
<li>Léger surcoût performance</li>
</ul>
</li>
<li>
<p><strong>BGP (Calico):</strong></p>
<ul>
<li>Routage natif</li>
<li>Meilleures performances</li>
<li>Plus complexe</li>
</ul>
</li>
</ul>
</section>

<h2 id="q3-static-pods-pour-control-plane">Q3: Static Pods pour Control Plane</h2>
<h3 id="r%C3%A9ponse-attendue-2">Réponse attendue</h3>
<ul>
<li><strong>Bootstrap problem:</strong> kubelet démarre avant l'API server</li>
<li><strong>Haute disponibilité:</strong> si API server crashe, kubelet le redémarre</li>
<li><strong>Simplicité:</strong> pas de dépendance à un orchestrateur externe</li>
</ul>
</section>

<h2 id="q5-drain-vs-cordon">Q5: Drain vs Cordon</h2>
<h3 id="r%C3%A9ponse-attendue-4">Réponse attendue</h3>
<ul>
<li><strong>Cordon:</strong> Empêche nouveaux pods, garde les existants</li>
<li><strong>Drain:</strong> Cordon + évacuation des pods existants</li>
</ul>
<h3 id="cas-dusage">Cas d'usage</h3>
<ul>
<li><strong>Cordon:</strong> Tests, observation</li>
<li><strong>Drain:</strong> Maintenance, upgrade</li>
</ul>
</section>

<h2 id="q6-ordre-upgrade">Q6: Ordre Upgrade</h2>
<h3 id="r%C3%A9ponse-attendue-5">Réponse attendue</h3>
<ul>
<li><strong>Rétrocompatibilité:</strong> kubelet N peut parler à API server N+1</li>
<li><strong>Mais:</strong> API server N+1 peut utiliser features incompatibles avec kubelet N-2</li>
<li><strong>Donc:</strong> Control plane first</li>
</ul>

<h3 id="limitations-actuelles">Limitations actuelles</h3>
<ul>
<li>Single point of failure</li>
<li>Pas de maintenance sans downtime</li>
<li>Pas de scaling</li>
</ul>
<h3 id="solutions">Solutions</h3>
<ul>
<li>Multiple masters (3 ou 5)</li>
<li>LoadBalancer devant API servers</li>
<li>etcd cluster (3 ou 5 membres)</li>
<li>HA proxy pour kubeconfig</li>
</ul>
</section>
