<h2 id="containerd-config-default--pas-portable-entre-distros"><code>containerd config default</code> — pas portable entre distros</h2>
<h3 id="la-commande-inspecte-lenvironnement-au-moment-de-lex%C3%A9cution">La commande inspecte l'environnement au moment de l'exécution</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># Sur CentOS 10 (systemd, cgroup v2)</span>
containerd config default | grep -E <span class="hljs-string">&quot;SystemdCgroup|snapshotter&quot;</span>
<span class="hljs-comment">#   SystemdCgroup = false       ← cgroupfs par défaut même sur systemd !</span>
<span class="hljs-comment">#   snapshotter = &quot;overlayfs&quot;</span>

<span class="hljs-comment"># Sur Alpine (OpenRC, cgroup v1 possible)</span>
containerd config default | grep -E <span class="hljs-string">&quot;SystemdCgroup|snapshotter&quot;</span>
<span class="hljs-comment">#   SystemdCgroup = false       ← identique</span>
<span class="hljs-comment">#   snapshotter = &quot;overlayfs&quot;</span>
</code></pre>
<h3 id="ce-qui-change-r%C3%A9ellement-selon-la-distro">Ce qui change réellement selon la distro</h3>
<table>
<thead>
<tr>
<th>Paramètre</th>
<th>CentOS 10</th>
<th>Alpine</th>
<th>Ubuntu 24.04</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>SystemdCgroup</code> (défaut)</td>
<td>false</td>
<td>false</td>
<td>false</td>
</tr>
<tr>
<td>cgroup version hôte</td>
<td><strong>v2</strong></td>
<td>v1 ou v2</td>
<td><strong>v2</strong></td>
</tr>
<tr>
<td>Init system</td>
<td>systemd</td>
<td>OpenRC</td>
<td>systemd</td>
</tr>
<tr>
<td>Ajustement requis</td>
<td><code>true</code></td>
<td>non</td>
<td><code>true</code></td>
</tr>
</tbody>
</table>
<blockquote>
<p><code>config default</code> donne <strong>les mêmes valeurs partout</strong> — c'est la config universelle minimale, pas la config optimale pour ton OS</p>
</blockquote>
</section>

<h2 id="r%C3%A8gle--toujours-g%C3%A9n%C3%A9rer-sur-la-cible-finale">Règle : toujours générer sur la cible finale</h2>
<h3 id="ne-jamais-copier-une-configtoml-dune-autre-machine">Ne jamais copier une config.toml d'une autre machine</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code><img class="emoji" draggable="false" alt="❌" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/274c.svg" data-marp-twemoji=""/> À ne pas faire
──────────────────────────────────────────────────────
Copier config.toml depuis un tuto, une VM de test,
ou un autre OS → valeurs inadaptées, bugs silencieux

<img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2705.svg" data-marp-twemoji=""/> Procédure correcte
──────────────────────────────────────────────────────
1. Installer containerd sur la machine CIBLE
2. containerd config default &gt; /etc/containerd/config.toml
3. Ajuster SystemdCgroup selon l'init system de CETTE machine
4. Redémarrer containerd sur CETTE machine
</code></pre>
<h3 id="pourquoi-les-bugs-sont-silencieux">Pourquoi les bugs sont silencieux</h3>
<ul>
<li>containerd démarre sans erreur avec une config incorrecte</li>
<li>Les pods démarrent… jusqu'à la pression mémoire</li>
<li>L'OOM killer se comporte différemment → crash imprévisibles</li>
<li><code>kubeadm init</code> peut passer → problèmes appraissent en production</li>
</ul>
<blockquote>
<p>La config containerd est <strong>locale</strong> : générée sur place, ajustée sur place</p>
</blockquote>

<h2 id="configuration-containerd---systemdcgroup">Configuration containerd - SystemdCgroup</h2>
<h3 id="%E2%9A%A0%EF%B8%8F-important-activer-systemdcgroup"><img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/26a0.svg" data-marp-twemoji=""/> IMPORTANT: Activer SystemdCgroup</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># Activer systemd cgroup driver (OBLIGATOIRE pour kubeadm)</span>
<span class="hljs-built_in">sudo</span> sed -i <span class="hljs-string">&#x27;s/SystemdCgroup = false/SystemdCgroup = true/&#x27;</span> \
  /etc/containerd/config.toml

<span class="hljs-comment"># Redémarrer containerd</span>
<span class="hljs-built_in">sudo</span> systemctl restart containerd
</code></pre>
<h3 id="pourquoi-systemdcgroup--true">Pourquoi SystemdCgroup = true ?</h3>
<table>
<thead>
<tr>
<th>Aspect</th>
<th>Explication</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Cohérence</strong></td>
<td>CentOS 10 utilise systemd comme init. Le cgroup driver doit correspondre</td>
</tr>
<tr>
<td><strong>kubelet</strong></td>
<td>Par défaut, kubelet utilise systemd cgroup driver depuis K8s 1.22+</td>
</tr>
<tr>
<td><strong>Stabilité</strong></td>
<td>Si containerd et kubelet utilisent des drivers différents → instabilité</td>
</tr>
<tr>
<td><strong>OOM Killer</strong></td>
<td>systemd gère mieux les limites mémoire et l'OOM killer</td>
</tr>
</tbody>
</table>
</section>

<h2 id="configuration-containerd---explication-d%C3%A9taill%C3%A9e">Configuration containerd - Explication détaillée</h2>
<h3 id="pourquoi-cette-configuration-est-critique">Pourquoi cette configuration est critique ?</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>┌──────────────────────────────────────────────────────────┐
│                      SYSTEMD (PID 1)                      │
│                         ↓                                 │
│              Gestion des cgroups v2                       │
│                    ↓           ↓                          │
│            ┌───────┴───┐ ┌────┴────┐                     │
│            │  kubelet  │ │containerd│                     │
│            │ (systemd) │ │(systemd) │ ← Doivent utiliser  │
│            └───────────┘ └──────────┘   le même driver!   │
└──────────────────────────────────────────────────────────┘
</code></pre>
<p><strong>Si drivers différents:</strong></p>
<ul>
<li>Conflits de gestion mémoire</li>
<li>Pods qui ne démarrent pas</li>
<li>Métriques incorrectes</li>
<li>Comportement OOM imprévisible</li>
</ul>
</section>

<h2 id="pourquoi-cgroupfs-par-d%C3%A9faut">Pourquoi cgroupfs par défaut ?</h2>
<h3 id="containerd-est-agnostique-de-linit-system">containerd est agnostique de l'init system</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>┌─────────────────────────────────────────────────────────────────┐
│              Environnements cibles de containerd                │
├─────────────────────────────────────────────────────────────────┤
│   • Linux avec systemd (RHEL, Ubuntu, Debian modernes)          │
│   • Linux avec OpenRC (Alpine, Gentoo)                          │
│   • Linux avec runit (Void Linux)                               │
│   • Linux minimal sans init (Docker-in-Docker)                  │
│   • WSL2 (pas de vrai init)                                     │
│   • Embedded Linux                                              │
└─────────────────────────────────────────────────────────────────┘
</code></pre>
<p><strong>Dénominateur commun:</strong> <code>/sys/fs/cgroup</code> (kernel Linux)</p>
<p>→ <strong>cgroupfs</strong> = choix par défaut le plus portable</p>
</section>

<h2 id="le-cas-alpine-sans-systemd">Le cas Alpine (sans systemd)</h2>
<h3 id="alpine-utilise-openrc-pas-systemd">Alpine utilise OpenRC, pas systemd</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># Sur Alpine, cgroupfs est le bon choix !</span>
<span class="hljs-comment"># /etc/containerd/config.toml</span>
[plugins.<span class="hljs-string">&quot;io.containerd.grpc.v1.cri&quot;</span>.containerd.runtimes.runc.options]
  SystemdCgroup = <span class="hljs-literal">false</span>  <span class="hljs-comment"># Correct pour Alpine</span>
</code></pre>
<p><strong>Si <code>SystemdCgroup = true</code> sur Alpine:</strong></p>
<ul>
<li>containerd cherche systemd via D-Bus</li>
<li>D-Bus n'existe pas → <strong>crash</strong></li>
</ul>

<h2 id="philosophie-containerd">Philosophie containerd</h2>
<h3 id="pourquoi-pas-de-d%C3%A9tection-automatique">Pourquoi pas de détection automatique ?</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>Philosophie containerd:
───────────────────────
&quot;Je suis un runtime bas niveau. Je ne fais pas de magie.
 L'administrateur sait mieux que moi dans quel environnement
 je tourne. Configuration explicite &gt; détection implicite.&quot;
</code></pre>
<p><strong>Raisons techniques:</strong></p>
<ul>
<li><strong>Prévisibilité</strong> — Comportement identique partout</li>
<li><strong>Containers imbriqués</strong> — systemd présent mais non fonctionnel</li>
<li><strong>Transition cgroups v1 → v2</strong> — Détection aurait été instable</li>
</ul>
</section>

<h2 id="r%C3%A9sum%C3%A9-pratique---cgroup-driver">Résumé pratique - Cgroup driver</h2>
<h3 id="quelle-configuration-selon-ton-environnement">Quelle configuration selon ton environnement ?</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>Distro avec systemd (CentOS, Ubuntu, Debian, RHEL) ?
────────────────────────────────────────────────────
  → SystemdCgroup = true  (OBLIGATOIRE)

k3s, RKE2, Talos, Flatcar ?
───────────────────────────
  → Déjà configuré, rien à faire

Alpine ou système sans systemd ?
────────────────────────────────
  → SystemdCgroup = false (le défaut est correct)
</code></pre>
<p>containerd choisit le mode universel → <strong>l'intégrateur fait le dernier pas</strong></p>
</section>

<h2 id="d%C3%A9sactivation-du-swap-sur-centos-10">Désactivation du swap sur CentOS 10</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># Désactiver le swap immédiatement</span>
<span class="hljs-built_in">sudo</span> swapoff -a

<span class="hljs-comment"># Désactiver le swap au boot (commenter la ligne swap dans fstab)</span>
<span class="hljs-built_in">sudo</span> sed -i <span class="hljs-string">&#x27;/ swap / s/^/#/&#x27;</span> /etc/fstab
</code></pre>
<h3 id="pourquoi-d%C3%A9sactiver-le-swap">Pourquoi désactiver le swap ?</h3>
<table>
<thead>
<tr>
<th>Raison</th>
<th>Explication</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Scheduling</strong></td>
<td>Kubernetes doit connaître la RAM réelle disponible</td>
</tr>
<tr>
<td><strong>Performance</strong></td>
<td>Le swap introduit des latences imprévisibles</td>
</tr>
<tr>
<td><strong>Limites</strong></td>
<td>Les limits de mémoire des pods deviennent imprécises</td>
</tr>
<tr>
<td><strong>OOM</strong></td>
<td>Le comportement OOM devient non-déterministe</td>
</tr>
</tbody>
</table>
<p><strong>Note:</strong> Depuis K8s 1.28+, le swap peut être activé avec configuration spécifique (voir section swap)</p>
</section>

<h2 id="selinux-en-production--pourquoi-cest-transparent">SELinux en production — pourquoi c'est transparent</h2>
<h3 id="container-selinux--d%C3%A9j%C3%A0-l%C3%A0-automatiquement"><code>container-selinux</code> — déjà là, automatiquement</h3>
<ul>
<li>Fournit les <strong>policies SELinux pour les containers</strong> : confine les processus avec le type <code>container_t</code></li>
<li>Restreint l'accès aux fichiers host, aux devices et au réseau depuis l'intérieur du container</li>
<li>Sur CentOS Stream 10 + repo Docker : <strong>installé automatiquement</strong> comme dépendance de <code>containerd.io</code></li>
<li>Depuis <strong>K8s 1.27</strong> : feature gate <code>SELinuxMount</code> (GA en 1.30) → labels SELinux appliqués correctement sur les volumes montés, sans hack</li>
<li>Résultat : en mode <code>enforcing</code>, les containers sont confinés <strong>sans configuration supplémentaire</strong></li>
</ul>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># Vérifier que container-selinux est présent</span>
rpm -q container-selinux

<span class="hljs-comment"># Confirmer que les containers tournent bien avec le bon type</span>
ps -eZ | grep containerd
</code></pre>
<blockquote>
<p><img class="emoji" draggable="false" alt="ℹ️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2139.svg" data-marp-twemoji=""/> Le mode <code>permissive</code> de ce TD n'est là que pour simplifier le troubleshooting — pas une nécessité technique.</p>
</blockquote>

<h2 id="questions-attendues---pr%C3%A9requis-12">Questions attendues - Prérequis (1/2)</h2>
<p><strong>Q: Pourquoi désactiver le swap ?</strong></p>
<blockquote>
<p>R: Kubernetes nécessite un contrôle précis de la mémoire pour le scheduling. Le swap introduit des performances imprévisibles.</p>
</blockquote>
<p><strong>Q: Différence entre containerd et Docker ?</strong></p>
<blockquote>
<p>R: containerd est le runtime de conteneurs (CRI), Docker est un ensemble d'outils incluant containerd. Kubernetes utilise directement containerd via CRI.</p>
</blockquote>
</section>

<h2 id="questions-attendues---pr%C3%A9requis-22">Questions attendues - Prérequis (2/2)</h2>
<p><strong>Q: Pourquoi <code>SystemdCgroup = true</code> ?</strong></p>
<blockquote>
<p>R: CentOS 10 utilise systemd comme gestionnaire de cgroups v2. Le kubelet utilise aussi systemd par défaut. Si drivers différents → conflits mémoire et pods qui crashent.</p>
</blockquote>
<p><strong>Q: Pourquoi SELinux en mode permissive ?</strong></p>
<blockquote>
<p>R: Pour simplifier le TD. En production, SELinux doit rester en enforcing.</p>
</blockquote>
</section>

<h2 id="kubelet---cri--d%C3%A9tail-des-appels">Kubelet - CRI : détail des appels</h2>
<table>
<thead>
<tr>
<th>Appel</th>
<th>Rôle</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>RunPodSandbox()</code></td>
<td>Crée le <strong>pause container</strong> + namespaces Linux (net, pid, ipc, uts) — la &quot;coquille&quot; vide du pod</td>
</tr>
<tr>
<td><code>CreateContainer()</code></td>
<td>Instancie un conteneur applicatif dans le sandbox (pull image, config)</td>
</tr>
<tr>
<td><code>StartContainer()</code></td>
<td>Démarre le conteneur (point d'entrée du process)</td>
</tr>
<tr>
<td><code>StopContainer()</code></td>
<td>Envoie SIGTERM puis SIGKILL après grace period</td>
</tr>
<tr>
<td><code>RemovePodSandbox()</code></td>
<td>Détruit le sandbox et tous ses conteneurs</td>
</tr>
</tbody>
</table>
<p>Le <strong>pause container</strong> (<code>registry.k8s.io/pause</code>) tient les namespaces en vie — si un conteneur applicatif crashe et redémarre, il réutilise les mêmes namespaces réseau/PID.</p>
</section>

<h2 id="kubelet---fonctions-g%C3%A9r%C3%A9es-directement">Kubelet - Fonctions gérées directement</h2>
<table>
<thead>
<tr>
<th>Fonction</th>
<th>Description</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Probes</strong></td>
<td>Exécute liveness/readiness/startup</td>
</tr>
<tr>
<td><strong>Ressources</strong></td>
<td>Applique requests/limits via cgroups</td>
</tr>
<tr>
<td><strong>Logs</strong></td>
<td>Capture stdout/stderr des containers</td>
</tr>
<tr>
<td><strong>Exec/Attach</strong></td>
<td>Permet <code>kubectl exec</code> et <code>kubectl attach</code></td>
</tr>
<tr>
<td><strong>Port-forward</strong></td>
<td>Permet <code>kubectl port-forward</code></td>
</tr>
<tr>
<td><strong>Éviction</strong></td>
<td>Tue des pods si le node manque de ressources</td>
</tr>
<tr>
<td><strong>Image GC</strong></td>
<td>Nettoie les images non utilisées</td>
</tr>
<tr>
<td><strong>Container GC</strong></td>
<td>Nettoie les containers morts</td>
</tr>
</tbody>
</table>
</section>

<h2 id="kubelet---en-r%C3%A9sum%C3%A9">Kubelet - En résumé</h2>
<h3 id="le-contrema%C3%AEtre-de-chaque-node">Le &quot;contremaître&quot; de chaque node</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>┌─────────────────────────────────────────────────────────┐
│                      KUBELET                            │
│                                                         │
│  • Reçoit les ordres du control plane (API Server)      │
│  • Coordonne les outils locaux:                         │
│    - Runtime (containerd)                               │
│    - Réseau (CNI)                                       │
│    - Stockage (CSI)                                     │
│  • Surveille que tout tourne (probes)                   │
│  • Remonte les problèmes (status, events)               │
│                                                         │
│  Sans kubelet, un node N'EXISTE PAS pour Kubernetes     │
└─────────────────────────────────────────────────────────┘
</code></pre>
</section>

<h2 id="kubelet-au-del%C3%A0-des-containers">Kubelet au-delà des containers</h2>
<h3 id="cri--deux-impl%C3%A9mentations-deux-niveaux-oci">CRI : deux implémentations, deux niveaux OCI</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>┌─────────────────────────────────────────────────────────────────┐
│                          KUBELET                                │
│                    ↓ parle CRI (gRPC)                           │
├──────────────────────────┬──────────────────────────────────────┤
│  containerd              │  CRI-O                               │
│  (CRI via plugin)        │  (CRI natif, conçu pour K8s)         │
│  ↓ appelle runtimes OCI  │  ↓ appelle runtimes OCI              │
├────────┬────────┬────────┼────────┬────────┬────────────────────┤
│  runc  │  kata  │ runsc  │  runc  │  kata  │  runsc             │
│        │(microVM│(gVisor)│        │(microVM│ (gVisor)           │
└────────┴────────┴────────┴────────┴────────┴────────────────────┘
</code></pre>
<p><strong>Couche 1 — implémentent CRI :</strong> <code>containerd</code> (plugin), <code>CRI-O</code> (natif)<br />
<strong>Couche 2 — runtimes OCI :</strong> <code>runc</code>, <code>kata-runtime</code>, <code>runsc</code> (gVisor)</p>
</section>

<h2 id="kubevirt--vm-dans-kubernetes-sans-toucher-%C3%A0-cri">KubeVirt — VM dans Kubernetes, sans toucher à CRI</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>┌──────────────────────────────────────────────────────────────────┐
│                    KUBERNETES API                                 │
│   kubectl apply VirtualMachine (CRD KubeVirt)                    │
│                        ↓                                         │
│             virt-controller (operator)                           │
│                        ↓ crée un Pod normal                      │
├──────────────────────────────────────────────────────────────────┤
│  kubelet → CRI → containerd → runc → Pod &quot;virt-launcher&quot;         │
│                                          ↓ (dans le container)   │
│                                     libvirt / QEMU               │
│                                          ↓ (KVM)                 │
│                                     Vraie VM (OS invité complet) │
└──────────────────────────────────────────────────────────────────┘
</code></pre>
<p>KubeVirt ne touche <strong>ni kubelet, ni CRI, ni les runtimes OCI</strong></p>

<h2 id="kubevirt--g%C3%A9rer-des-vms-cest-une-autre-approche">KubeVirt — Gérer des VMs, c'est une autre approche</h2>
<h3 id="containers-vs-vms-dans-kubernetes">Containers vs VMs dans Kubernetes</h3>
<table>
<thead>
<tr>
<th></th>
<th>Containers (runc/kata)</th>
<th>KubeVirt</th>
</tr>
</thead>
<tbody>
<tr>
<td>Unité schedulée</td>
<td>Pod</td>
<td>Pod (<code>virt-launcher</code>)</td>
</tr>
<tr>
<td>Isolation</td>
<td>namespaces/cgroups (ou microVM kata)</td>
<td>QEMU + KVM</td>
</tr>
<tr>
<td>OS invité</td>
<td>Non (shared kernel)</td>
<td>Oui (kernel complet)</td>
</tr>
<tr>
<td>Niveau d'extension</td>
<td>OCI runtime</td>
<td>Kubernetes CRD + Operator</td>
</tr>
<tr>
<td>kubelet modifié ?</td>
<td><strong>Non</strong></td>
<td><strong>Non</strong></td>
</tr>
</tbody>
</table>
<blockquote>
<p>On ne remplace pas le runtime : on encapsule QEMU dans un pod</p>
</blockquote>
</section>

<h2 id="kubevirt--kubelet-a-t-il-encore-du-sens">KubeVirt — Kubelet a-t-il encore du sens ?</h2>
<h3 id="oui--et-%C3%A0-deux-niveaux">Oui — et à deux niveaux</h3>
<p><strong>1. Le nœud n'est pas 100% VMs</strong></p>
<ul>
<li>Pods système toujours présents : CNI, CSI, kube-proxy, monitoring, etc.</li>
<li>Rien n'empêche containers ET VMs sur le même worker</li>
</ul>
<p><strong>2. Kubelet gère le pod <code>virt-launcher</code> lui-même</strong></p>
<ul>
<li>Liveness/readiness probes sur la VM</li>
<li>Resource limits CPU/RAM → éviction si pression mémoire</li>
<li>Scheduling, QoS class, PodDisruptionBudget</li>
</ul>
<p><strong>Ce que KubeVirt ajoute <em>au-dessus</em> de kubelet :</strong></p>
<ul>
<li>Live migration entre nœuds (coordonné par <code>virt-controller</code>)</li>
<li>Snapshots, disques persistants (CDI)</li>
<li>API <code>VirtualMachine</code> / <code>VMI</code> pour le cycle de vie VM</li>
</ul>
<blockquote>
<p>Kubelet gère le pod qui <strong>contient</strong> la VM.<br />
KubeVirt gère ce qui est <strong>à l'intérieur</strong> — QEMU, migration, disques.</p>
</blockquote>
</section>

<h2 id="cri---les-diff%C3%A9rents-runtimes">CRI - Les différents runtimes</h2>
<h3 id="1-containers-classiques-runc">1. Containers classiques (runc)</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>PodSpec → kubelet → containerd → runc → container Linux
                                        (namespaces + cgroups)
</code></pre>
<h3 id="2-kata-containers-microvms">2. Kata Containers (microVMs)</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>PodSpec → kubelet → containerd → kata-runtime → QEMU/Firecracker
                                                (vraie VM légère)
</code></pre>
<h3 id="3-gvisor-sandbox-userspace">3. gVisor (sandbox userspace)</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>PodSpec → kubelet → containerd → runsc → gVisor kernel
</code></pre>
<h3 id="4-webassembly-wasm">4. WebAssembly (WASM)</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>PodSpec → kubelet → containerd → runwasi → wasmtime/spin
</code></pre>

<h2 id="container-classique-vs-kata-container">Container classique vs Kata Container</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>┌─────────────────────────────────────────────────────────────────┐
│                     NODE (bare metal/VM)                        │
│                                                                 │
│   Container classique          Kata Container                   │
│   ┌─────────────────┐          ┌─────────────────────────────┐  │
│   │ App             │          │  microVM                    │  │
│   │ ─────────────── │          │  ┌─────────────────────────┐│  │
│   │ Shared kernel   │          │  │ App                     ││  │
│   │ (host kernel)   │          │  │ ───────────────────     ││  │
│   └─────────────────┘          │  │ Guest kernel (dédié)    ││  │
│                                │  └─────────────────────────┘│  │
│                                └─────────────────────────────┘  │
│                                                                 │
│   Isolation: namespaces        Isolation: hyperviseur           │
│   Rapide, léger                Plus lent, plus isolé            │
└─────────────────────────────────────────────────────────────────┘
</code></pre>
</section>

<tr>
<td><code>kubeReserved</code></td>
<td>CPU/RAM réservés pour kubelet, kube-proxy, containerd</td>
</tr>
<tr>
<td><code>systemReserved</code></td>
<td>CPU/RAM réservés pour l'OS (systemd, sshd…)</td>
</tr>
<tr>
<td><code>evictionHard</code></td>
<td>Seuils sous lesquels kubelet tue des pods pour récupérer des ressources</td>
</tr>
<tr>
<td><code>maxPods</code></td>
<td>Limite absolue de pods sur le nœud (défaut kubeadm : 110)</td>
</tr>
<tr>
<td><code>podsPerCore</code></td>
<td>Limite relative : effectif = <code>min(maxPods, podsPerCore × cores)</code></td>
</tr>
</tbody>
</table>
<p><strong>Ressources allouables au scheduler :</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>Allocatable = Capacité nœud − kubeReserved − systemReserved − evictionHard
</code></pre>
<p><strong>Réponses exercice :</strong></p>
<ol>
<li><strong>Clés d'authentification</strong> → <code>/etc/kubernetes/pki/ca.crt</code> (CA), <code>/var/lib/kubelet/pki/kubelet.crt</code> (cert servant), <code>/etc/kubernetes/kubelet.conf</code> (kubeconfig client)</li>
<li><strong>maxPods</strong> → <code>110</code> (défaut kubeadm)</li>
<li><strong>Static pods</strong> → <code>/etc/kubernetes/manifests/</code> (champ <code>staticPodPath</code>)</li>
</ol>
</section>

<h3 id="analogie-simple--le-videur-de-boite-de-nuit">Analogie simple : Le videur de boite de nuit</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>┌─────────────────────────────────────────────────────────┐
│                      NODE                               │
│                                                         │
│   TAINT = &quot;Panneau a l'entree&quot;                         │
│   ┌─────────────────────────────┐                      │
│   │  <img class="emoji" draggable="false" alt="🚫" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/1f6ab.svg" data-marp-twemoji=""/> INTERDIT AUX PODS       │                      │
│   │     SANS TOLERATION         │                      │
│   └─────────────────────────────┘                      │
│                                                         │
│   TOLERATION = &quot;Badge VIP du Pod&quot;                      │
│   ┌─────────────────────────────┐                      │
│   │  <img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2705.svg" data-marp-twemoji=""/> J'ai le droit d'entrer  │                      │
│   └─────────────────────────────┘                      │
└─────────────────────────────────────────────────────────┘
</code></pre>
<p><strong>Taint</strong> = Le node <strong>repousse</strong> les pods<br />
<strong>Toleration</strong> = Le pod <strong>tolere</strong> le taint (peut entrer)</p>

<h3 id="exemples-concrets">Exemples concrets :</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># Marquer un node pour maintenance</span>

<h2 id="questions-frequentes---taints">Questions frequentes - Taints</h2>
<p><strong>Q: Pourquoi ne pas toujours utiliser NoExecute ?</strong></p>
<blockquote>
<p>R: NoExecute est <strong>agressif</strong> et cause des interruptions. NoSchedule suffit pour la maintenance planifiee.</p>
</blockquote>
<p><strong>Q: Comment fonctionne l'operator 'Exists' ?</strong></p>
<blockquote>
<p>R: C'est un <strong>wildcard</strong>. Sans value = tolere toutes les valeurs. Sans key = tolere TOUT.</p>
</blockquote>
<p><strong>Q: Taint seul vs Taint + nodeSelector ?</strong></p>
<blockquote>
<p>R: Taint <strong>repousse</strong> les autres pods. Mais le pod avec toleration peut aller <strong>n'importe ou</strong>. Ajoutez nodeSelector pour <strong>forcer</strong> le placement.</p>
</blockquote>
<p><strong>Q: Comment voir les taints d'un node ?</strong></p>
<blockquote>
<p>R: <code>kubectl describe node &lt;name&gt; | grep Taints</code></p>
</blockquote>

│                        └─────────────┘             │

<h2 id="mod%C3%A8le-osi--o%C3%B9-se-situent-ipip-et-vxlan">Modèle OSI — où se situent IPIP et VXLAN</h2>
<div style="display:flex;flex-direction:column;gap:4px;font-size:0.82em;margin-top:6px">
  <div style="background:#f3e8ff;border-radius:6px;padding:7px 16px;border-left:5px solid #9333ea"><strong>L7 · Application</strong> &nbsp;·&nbsp; HTTP, gRPC, données du pod</div>
  <div style="background:#ede9fe;border-radius:6px;padding:7px 16px;border-left:5px solid #7c3aed;opacity:0.7"><strong>L6 · Présentation</strong> &nbsp;·&nbsp; <em>théorique — fondu dans L7 en TCP/IP (TLS, encodage)</em></div>
  <div style="background:#ede9fe;border-radius:6px;padding:7px 16px;border-left:5px solid #7c3aed;opacity:0.7"><strong>L5 · Session</strong> &nbsp;·&nbsp; <em>théorique — fondu dans L7 en TCP/IP (sessions HTTP, WebSocket)</em></div>
  <div style="text-align:center;color:#888;font-size:0.8em">▼</div>
  <div style="background:#bbf7d0;border-radius:6px;padding:7px 16px;border-left:5px solid #16a34a"><strong>L4 · Transport</strong> &nbsp;·&nbsp; TCP (proto 6) · UDP (proto 17) &nbsp;·&nbsp; <em>ports src / dst</em> &nbsp;← <strong>Security Groups filtrent ici</strong></div>
  <div style="text-align:center;color:#888;font-size:0.8em">▼</div>
  <div style="background:#fef08a;border-radius:6px;padding:7px 16px;border-left:5px solid #ca8a04"><strong>L3 · Réseau</strong> &nbsp;·&nbsp; IP · adresses src/dst · champ <strong>Protocol</strong> (1 octet) &nbsp;·&nbsp; <em>proto 4 = IPIP · proto 17 = UDP</em></div>
  <div style="text-align:center;color:#888;font-size:0.8em">▼</div>
  <div style="background:#e0f2fe;border-radius:6px;padding:7px 16px;border-left:5px solid #0284c7"><strong>L2 · Liaison</strong> &nbsp;·&nbsp; Ethernet · adresses MAC</div>
  <div style="text-align:center;color:#888;font-size:0.8em">▼</div>
  <div style="background:#f1f5f9;border-radius:6px;padding:7px 16px;border-left:5px solid #94a3b8"><strong>L1 · Physique</strong> &nbsp;·&nbsp; câble · fibre · switch virtuel</div>
</div>
<blockquote>
<p>L5/L6 existent dans le modèle OSI théorique (1984) mais <strong>n'ont pas d'équivalent en TCP/IP</strong> — on parle uniquement de L3/L4/L7 en pratique. IPIP : L3→L3, pas de L4 → drop SG.</p>

<h2 id="ip-protocol-number-4--pas-iso-tp4-mais-ip-in-ip">IP protocol number 4 — pas ISO-TP4, mais IP-in-IP</h2>
<p><strong>&quot;Protocol 4&quot;</strong> dans le header IP = numéro de protocole IANA de la payload, <strong>pas</strong> une version d'ISO.</p>
<table>
<thead>
<tr>
<th>N°</th>
<th>Protocole</th>
<th>Utilisé par</th>
</tr>
</thead>
<tbody>
<tr>
<td>1</td>
<td>ICMP</td>
<td>ping, traceroute</td>
</tr>
<tr>
<td>4</td>
<td><strong>IPIP</strong> (IP-in-IP, RFC 2003)</td>
<td>Calico mode IPIP, tunl0</td>
</tr>
<tr>
<td>6</td>
<td>TCP</td>
<td>HTTP, HTTPS, SSH…</td>
</tr>
<tr>
<td>17</td>
<td>UDP</td>
<td>DNS, VXLAN (port 4789), Flannel (port 8472)</td>
</tr>
<tr>
<td>41</td>
<td>IPv6-in-IPv4</td>
<td>tunnels 6to4</td>
</tr>
<tr>
<td>47</td>
<td>GRE</td>
<td>VPN, certains CNI</td>
</tr>
</tbody>
</table>
<p><strong>Pourquoi les security groups bloquent IPIP :</strong></p>
<ul>
<li>Les règles SG cloud opèrent sur TCP / UDP / ICMP uniquement</li>
<li>Il n'existe pas de règle &quot;autoriser protocol 4&quot;</li>
<li>Le paquet IPIP passe le SG → <strong>DROP silencieux</strong>, sans log, sans ICMP unreachable</li>
<li>VXLAN utilise UDP 4789 → tombe dans une règle UDP existante → <strong>ALLOW</strong></li>
</ul>
<blockquote>
<p><img class="emoji" draggable="false" alt="⚠️" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/26a0.svg" data-marp-twemoji=""/> ISO-TP4 (Transport Protocol class 4, OSI années 80) est sans rapport — coïncidence de numérotation</p>
</blockquote>

<h2 id="variante--power-off-via-lapi-exoscale">Variante — Power off via l'API Exoscale</h2>
<p>Au lieu de <code>systemctl stop kubelet</code> sur le worker, vous pouvez <strong>éteindre la VM directement</strong> via l'API ou la console Exoscale.</p>
<table>
<thead>
<tr>
<th></th>
<th><code>systemctl stop kubelet</code></th>
<th>Power off Exoscale</th>
</tr>
</thead>
<tbody>
<tr>
<td>Arrêt kubelet</td>
<td>graceful</td>
<td>brutal (coupure réseau)</td>
</tr>
<tr>
<td>Pods reçoivent SIGTERM</td>
<td><img class="emoji" draggable="false" alt="✅" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/2705.svg" data-marp-twemoji=""/></td>
<td><img class="emoji" draggable="false" alt="❌" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/274c.svg" data-marp-twemoji=""/></td>
</tr>
<tr>
<td>Node → NotReady</td>
<td>~40s</td>
<td>~40s</td>
</tr>
<tr>
<td>Pods évincés après</td>
<td>~5 min</td>
<td>~5 min</td>
</tr>
<tr>
<td>PDB respecté</td>
<td><img class="emoji" draggable="false" alt="❌" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/274c.svg" data-marp-twemoji=""/> panne involontaire</td>
<td><img class="emoji" draggable="false" alt="❌" src="https://cdn.jsdelivr.net/gh/jdecked/twemoji@17.0.2/assets/svg/274c.svg" data-marp-twemoji=""/> panne involontaire</td>
</tr>
<tr>
<td>Réalisme</td>
<td>Bon</td>
<td><strong>Meilleur</strong></td>
</tr>
</tbody>
</table>
<p><strong>Les deux sont des pannes non-volontaires</strong> — Kubernetes ne reçoit aucun signal, le node-controller attend <code>node-monitor-grace-period</code> avant de déclarer le nœud <code>NotReady</code>.</p>
<p>La récupération se fait en rallumant la VM via l'API Exoscale — kubelet redémarre automatiquement au boot.</p>
</section>

<h2 id="etcd--r%C3%B4le-dans-kubernetes">etcd — rôle dans Kubernetes</h2>
<h3 id="lunique-source-de-v%C3%A9rit%C3%A9">L'unique source de vérité</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>┌─────────────────────────────────────────────────────────────┐
│                      CONTROL PLANE                          │
│                                                             │
│  kubectl → API Server → etcd  ← tout l'état du cluster     │
│                ↑                                            │
│  scheduler, controller-manager lisent/écrivent via API      │
└─────────────────────────────────────────────────────────────┘
</code></pre>
<p><strong>Ce qu'etcd stocke :</strong></p>
<ul>
<li>Tous les objets Kubernetes (Pods, Services, ConfigMaps…)</li>
<li>L'état désiré ET l'état observé</li>
<li>Les secrets (chiffrés at rest depuis K8s 1.13+)</li>
</ul>
<blockquote>
<p>Perte d'etcd = perte du cluster. C'est le seul composant <strong>stateful</strong>.</p>
</blockquote>

<p>Sous le capot (etcd 3.6) :</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># Déplacer les manifests statiques (arrête etcd + API server)</span>
<span class="hljs-built_in">mv</span> /etc/kubernetes/manifests/etcd.yaml /tmp/etcd.yaml.bak

<span class="hljs-comment"># Restaurer (etcdutl, pas etcdctl)</span>

  --data-dir=/var/lib/etcd-restored --name=master \
  --initial-cluster=master=https://&lt;IP&gt;:2380

<span class="hljs-comment"># Patcher le manifest → nouveau data-dir → remettre en place</span>
</code></pre>

<h2 id="etcdctl--points-instructeur">etcdctl — points instructeur</h2>
<h3 id="pi%C3%A8ges-fr%C3%A9quents-etcd-36">Pièges fréquents (etcd 3.6)</h3>
<table>
<thead>
<tr>
<th>Piège</th>
<th>Symptôme</th>
<th>Fix</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>etcdctl snapshot restore</code></td>
<td><code>unknown flag: --data-dir</code></td>
<td>Utiliser <code>etcdutl snapshot restore</code></td>
</tr>
<tr>
<td><code>etcdctl snapshot status</code></td>
<td>Help affiché, pas de status</td>
<td>Utiliser <code>etcdutl snapshot status</code></td>
</tr>
<tr>
<td><code>sudo etcdctl</code></td>
<td><code>command not found</code></td>
<td>Utiliser le chemin absolu ou <code>export PATH=&quot;/usr/local/bin:$PATH&quot;</code></td>
</tr>
<tr>
<td>Post-restore <code>kubectl</code></td>
<td><code>Forbidden: nodes is forbidden</code></td>
<td><code>sudo systemctl restart kubelet</code></td>
</tr>
<tr>
<td>Mauvais certificat</td>
<td><code>x509: certificate signed by unknown authority</code></td>
<td>Vérifier les 3 chemins PKI</td>
</tr>
<tr>
<td>etcd pod stacked</td>
<td><code>connection refused</code> pendant restore</td>
<td>Déplacer le manifest statique d'abord</td>
</tr>
</tbody>
</table>
<h3 id="quand-utiliser-etcdctl-en-td">Quand utiliser etcdctl en TD ?</h3>
<ul>
<li><strong>Avant l'upgrade</strong> (Partie 7) → snapshot obligatoire</li>
<li><strong>Curiosité pédagogique</strong> → <code>get / --prefix --keys-only</code> pour voir l'état brut</li>
<li><strong>Scénario de panne</strong> → restauration avec démo 03b pour rendre visible le revert</li>
</ul>
</section>

<h2 id="le-probl%C3%A8me--isolation-des-containers">Le problème — isolation des containers</h2>
<ul>
<li><code>runc</code> partage le <strong>kernel hôte</strong> avec tous les containers</li>
<li>CVE kernel = <strong>tous les containers exposés</strong></li>
<li>Attaque kernel: escalade de privilèges possible</li>
</ul>
<svg width="760" height="185" viewBox="0 0 760 185" xmlns="http://www.w3.org/2000/svg" role="img" aria-hidden="true" font-family="sans-serif">

<h2 id="gvisor--kernel-en-espace-utilisateur">gVisor — kernel en espace utilisateur</h2>

<h2 id="installation-de-gvisor">Installation de gVisor</h2>
<p>Deux binaires requis sur chaque nœud:</p>
<ul>

<p>Config containerd via drop-in (ne pas modifier <code>config.toml</code>):</p>

<h2 id="containerd-2x--le-plugin-cri-a-chang%C3%A9-de-nom">containerd 2.x — le plugin CRI a changé de nom</h2>
<h3 id="containerd-1x-vs-2x--deux-chemins-incompatibles">containerd 1.x vs 2.x : deux chemins incompatibles</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-toml"><span class="hljs-comment"># containerd 1.x  (&lt; 2.0)</span>
<span class="hljs-section">[plugins.&quot;io.containerd.grpc.v1.cri&quot;.containerd.runtimes.runsc]</span>
  <span class="hljs-attr">runtime_type</span> = <span class="hljs-string">&quot;io.containerd.runsc.v1&quot;</span>

<span class="hljs-comment"># containerd 2.x  (ce TD)</span>
<span class="hljs-section">[plugins.&#x27;io.containerd.cri.v1.runtime&#x27;.containerd.runtimes.runsc]</span>
  <span class="hljs-attr">runtime_type</span> = <span class="hljs-string">&#x27;io.containerd.runsc.v1&#x27;</span>
</code></pre>
<h3 id="pourquoi-ce-renommage">Pourquoi ce renommage ?</h3>
<ul>
<li>En 1.x, le CRI était un <strong>plugin gRPC parmi d'autres</strong> → <code>grpc.v1.cri</code></li>
<li>En 2.x, le CRI est <strong>natif</strong> dans containerd → <code>cri.v1.runtime</code></li>
<li>Le préfixe <code>grpc</code> disparaît : CRI n'est plus un greffon, c'est le cœur</li>
</ul>
<h3 id="pi%C3%A8ge-fr%C3%A9quent">Piège fréquent</h3>
<p>Copier une config gVisor/kata depuis internet → souvent écrite pour 1.x<br />
→ containerd 2.x <strong>ignore silencieusement</strong> la section mal nommée<br />
→ le runtime n'apparaît pas, sans message d'erreur explicite</p>
</section>

<h2 id="d%C3%A9monstration-de-lisolation">Démonstration de l'isolation</h2>
<p>Comparaison <code>runc</code> vs <code>gVisor</code> depuis un container:</p>
<table>
<thead>
<tr>
<th>Commande</th>
<th>runc</th>
<th>gVisor</th>
</tr>
</thead>
<tbody>
<tr>
<td><code>uname -r</code></td>
<td>Kernel hôte (ex: 5.14.x)</td>
<td>4.4.0 (Sentry)</td>
</tr>
<tr>
<td><code>dmesg</code></td>
<td>Logs kernel hôte</td>
<td>Logs Sentry isolés</td>
</tr>
<tr>
<td><code>/proc/version</code></td>
<td>Linux hôte</td>
<td>gVisor version</td>
</tr>
</tbody>
</table>
<p><strong>Point pédagogique:</strong> le kernel &quot;4.4.0&quot; est celui du Sentry gVisor — pas le kernel hôte. L'app voit un kernel virtuel.</p>
</section>

<h2 id="namespace-d%C3%A9di%C3%A9--organisation-pas-enforcement">Namespace dédié — organisation, pas enforcement</h2>
<p>Un namespace <code>secure-ns</code> n'impose <strong>pas</strong> gVisor automatiquement.<br />
<code>runtimeClassName</code> doit toujours être spécifié dans chaque podSpec.</p>
<p>L'intérêt est <strong>organisationnel</strong> :</p>
<table>

<h2 id="injection-automatique--runtimeclassinpoddefaults">Injection automatique — <code>RuntimeClassInPodDefaults</code></h2>
<p>Feature gate (beta K8s 1.31) qui impose un runtime <strong>par défaut sur tout le cluster</strong>.<br />
Tout pod sans <code>runtimeClassName</code> reçoit la RuntimeClass marquée comme défaut.</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-yaml"><span class="hljs-attr">apiVersion:</span> <span class="hljs-string">node.k8s.io/v1</span>
<span class="hljs-attr">kind:</span> <span class="hljs-string">RuntimeClass</span>
<span class="hljs-attr">metadata:</span>
  <span class="hljs-attr">name:</span> <span class="hljs-string">gvisor</span>
<span class="hljs-attr">handler:</span> <span class="hljs-string">runsc</span>
<span class="hljs-attr">scheduling:</span>
  <span class="hljs-attr">nodeSelector:</span>
    <span class="hljs-attr">kubernetes.io/arch:</span> <span class="hljs-string">amd64</span>
<span class="hljs-comment"># Champ ajouté par RuntimeClassInPodDefaults :</span>
<span class="hljs-attr">defaultRuntimeClassName:</span> <span class="hljs-literal">true</span>   <span class="hljs-comment"># ← ce RuntimeClass devient le défaut cluster-wide</span>
</code></pre>
<p>Activer dans kubeadm (<code>/etc/kubernetes/manifests/kube-apiserver.yaml</code>) :</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>--feature-gates=RuntimeClassInPodDefaults=true
</code></pre>
<p><strong>Limite : c'est global</strong> — tous les namespaces sont affectés.<br />
Pour cibler un namespace précis → Kyverno (slide suivant).</p>

<h2 id="injection-par-namespace--kyverno">Injection par namespace — Kyverno</h2>
<p>Pour enforcer gVisor <strong>uniquement dans certains namespaces</strong>, on utilise un <strong>mutating admission webhook</strong>. Kyverno est l'outil le plus simple :</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">kubectl label namespace secure-ns runtime-class=gvisor
</code></pre>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-yaml"><span class="hljs-attr">apiVersion:</span> <span class="hljs-string">kyverno.io/v1</span>
<span class="hljs-attr">kind:</span> <span class="hljs-string">ClusterPolicy</span>
<span class="hljs-attr">metadata:</span>
  <span class="hljs-attr">name:</span> <span class="hljs-string">inject-gvisor-by-namespace</span>
<span class="hljs-attr">spec:</span>
  <span class="hljs-attr">rules:</span>
  <span class="hljs-bullet">-</span> <span class="hljs-attr">name:</span> <span class="hljs-string">inject-runtimeclass</span>
    <span class="hljs-attr">match:</span>
      <span class="hljs-attr">any:</span>
      <span class="hljs-bullet">-</span> <span class="hljs-attr">resources:</span>
          <span class="hljs-attr">kinds:</span> [<span class="hljs-string">Pod</span>]
          <span class="hljs-attr">namespaceSelector:</span>
            <span class="hljs-attr">matchLabels:</span>
              <span class="hljs-attr">runtime-class:</span> <span class="hljs-string">gvisor</span>
    <span class="hljs-attr">mutate:</span>
      <span class="hljs-attr">patchStrategicMerge:</span>
        <span class="hljs-attr">spec:</span>
          <span class="hljs-attr">runtimeClassName:</span> <span class="hljs-string">gvisor</span>
</code></pre>
<p>Tout pod créé dans <code>secure-ns</code> reçoit <code>runtimeClassName: gvisor</code> automatiquement — même sans que le développeur le spécifie. <strong>Ce TP n'installe pas Kyverno</strong> — runtimeClassName est toujours explicite.</p>
</section>

<h2 id="quest-ce-quun-cgroup">Qu'est-ce qu'un cgroup ?</h2>
<ul>
<li><strong>Linux Control Groups</strong> — mécanisme noyau depuis kernel 2.6.24 (2008)</li>
<li>Organise les processus en groupes hiérarchiques</li>
<li>Contrôle et limite : <strong>CPU</strong> · <strong>mémoire</strong> · <strong>I/O disque</strong> · <strong>réseau</strong> · <strong>devices</strong></li>
<li>Implémenté comme un <strong>pseudo-filesystem</strong> : <code>/sys/fs/cgroup/</code></li>
<li><strong>cgroup v1</strong> (2008) : hiérarchies séparées par subsystem (<code>/cpu/</code>, <code>/memory/</code>, <code>/blkio/</code>)</li>
<li><strong>cgroup v2</strong> (kernel 4.5, 2016) : hiérarchie unifiée, standard actuel</li>
</ul>
<blockquote>
<p>Un container = un processus Linux + <strong>namespaces</strong> (isolation) + <strong>cgroups</strong> (limitation)</p>
</blockquote>
</section>

<h2 id="container-%E2%86%92-cgroup-avec-nerdctl">Container → cgroup avec nerdctl</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># Lancer un container avec limites</span>
nerdctl run -d --name demo --cpus 0.5 --memory 128m nginx:alpine

<span class="hljs-comment"># PID du processus principal</span>
PID=$(nerdctl inspect -f <span class="hljs-string">&#x27;{{.State.Pid}}&#x27;</span> demo)

<span class="hljs-comment"># Trouver le cgroup (v2 : entrée &quot;0::&quot;)</span>
CGPATH=$(awk -F: <span class="hljs-string">&#x27;/^0:/{print $3}&#x27;</span> /proc/<span class="hljs-variable">$PID</span>/cgroup)

<span class="hljs-comment"># Lire les limites appliquées</span>
<span class="hljs-built_in">cat</span> /sys/fs/cgroup<span class="hljs-variable">${CGPATH}</span>/memory.max
<span class="hljs-comment"># → 134217728   (= 128 MiB)</span>

<span class="hljs-built_in">cat</span> /sys/fs/cgroup<span class="hljs-variable">${CGPATH}</span>/cpu.max
<span class="hljs-comment"># → 50000 100000   (50 000 µs sur 100 000 µs = 50% d&#x27;un CPU)</span>

<span class="hljs-built_in">cat</span> /sys/fs/cgroup<span class="hljs-variable">${CGPATH}</span>/memory.current
<span class="hljs-comment"># → consommation réelle en bytes</span>
</code></pre>

<h2 id="manipuler-les-cgroups-%C3%A0-la-main">Manipuler les cgroups à la main</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># Activer les contrôleurs dans la racine</span>
<span class="hljs-built_in">echo</span> <span class="hljs-string">&quot;+memory +cpu&quot;</span> &gt; /sys/fs/cgroup/cgroup.subtree_control

<span class="hljs-comment"># Créer un cgroup dédié</span>
<span class="hljs-built_in">mkdir</span> /sys/fs/cgroup/demo-manual

<span class="hljs-comment"># Limiter la mémoire à 64 MiB</span>
<span class="hljs-built_in">echo</span> $((<span class="hljs-number">64</span> * <span class="hljs-number">1024</span> * <span class="hljs-number">1024</span>)) &gt; /sys/fs/cgroup/demo-manual/memory.max

<span class="hljs-comment"># Limiter le CPU à 25%  (250 ms sur 1 s)</span>
<span class="hljs-built_in">echo</span> <span class="hljs-string">&quot;250000 1000000&quot;</span> &gt; /sys/fs/cgroup/demo-manual/cpu.max

<span class="hljs-comment"># Placer le shell courant dans ce cgroup</span>
<span class="hljs-built_in">echo</span> $$ &gt; /sys/fs/cgroup/demo-manual/cgroup.procs

<span class="hljs-comment"># Provoquer un OOM kill (dépasse 64 MiB)</span>
stress --vm 1 --vm-bytes 200M   <span class="hljs-comment"># → Killed</span>

<span class="hljs-comment"># Sortir + nettoyer</span>
<span class="hljs-built_in">echo</span> $$ &gt; /sys/fs/cgroup/cgroup.procs
<span class="hljs-built_in">rmdir</span> /sys/fs/cgroup/demo-manual
</code></pre>

<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-c"><span class="hljs-meta">#<span class="hljs-keyword">include</span> <span class="hljs-string">&lt;stdio.h&gt;</span></span>

<span class="hljs-meta">#<span class="hljs-keyword">include</span> <span class="hljs-string">&lt;fcntl.h&gt;</span></span>
<span class="hljs-meta">#<span class="hljs-keyword">define</span> CG <span class="hljs-string">&quot;/sys/fs/cgroup/demo_c&quot;</span></span>

<span class="hljs-type">static</span> <span class="hljs-type">void</span> <span class="hljs-title function_">cg_write</span><span class="hljs-params">(<span class="hljs-type">const</span> <span class="hljs-type">char</span> *file, <span class="hljs-type">const</span> <span class="hljs-type">char</span> *val)</span> {

    <span class="hljs-built_in">snprintf</span>(path, <span class="hljs-keyword">sizeof</span>(path), CG <span class="hljs-string">&quot;/%s&quot;</span>, file);
    <span class="hljs-type">int</span> fd = open(path, O_WRONLY);
    write(fd, val, <span class="hljs-built_in">strlen</span>(val));  close(fd);
}
<span class="hljs-type">int</span> <span class="hljs-title function_">main</span><span class="hljs-params">(<span class="hljs-type">void</span>)</span> {
    mkdir(CG, <span class="hljs-number">0755</span>);
    cg_write(<span class="hljs-string">&quot;memory.max&quot;</span>, <span class="hljs-string">&quot;67108864&quot;</span>);    <span class="hljs-comment">/* 64 MiB */</span>
    cg_write(<span class="hljs-string">&quot;cpu.max&quot;</span>,    <span class="hljs-string">&quot;250000 1000000&quot;</span>); <span class="hljs-comment">/* 25% */</span>

        cg_write(<span class="hljs-string">&quot;cgroup.procs&quot;</span>, buf);   <span class="hljs-comment">/* rejoindre le cgroup */</span>

<h2 id="cgroups-dans-kubernetes--qos-classes">cgroups dans Kubernetes — QoS classes</h2>
<p>kubelet organise les pods dans <code>/sys/fs/cgroup/kubepods/</code> selon la <strong>QoS class</strong> :</p>
<table>
<thead>
<tr>
<th>QoS class</th>
<th>Condition</th>
<th>Path cgroup</th>
<th>Priorité OOM</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Guaranteed</strong></td>
<td>requests == limits (tous)</td>
<td><code>kubepods/pod&lt;uid&gt;/</code></td>
<td>Dernière victime</td>
</tr>
<tr>
<td><strong>Burstable</strong></td>
<td>au moins un request défini</td>
<td><code>kubepods/burstable/pod&lt;uid&gt;/</code></td>
<td>Selon usage</td>
</tr>
<tr>
<td><strong>BestEffort</strong></td>
<td>aucun request/limit</td>
<td><code>kubepods/besteffort/pod&lt;uid&gt;/</code></td>
<td>Premier tué</td>
</tr>
</tbody>
</table>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># Sur un nœud worker : inspecter le cgroup d&#x27;un container</span>
crictl inspect &lt;cid&gt; | jq -r <span class="hljs-string">&#x27;.info.runtimeSpec.linux.cgroupsPath&#x27;</span>
<span class="hljs-comment"># → /kubepods/burstable/pod&lt;uid&gt;/&lt;cid&gt;</span>

<span class="hljs-comment"># Vérifier les limites effectives</span>
<span class="hljs-built_in">cat</span> /sys/fs/cgroup/kubepods/burstable/pod&lt;uid&gt;/memory.max
</code></pre>
</section>

<h2 id="r%C3%A9sum%C3%A9--du-yaml-au-noyau">Résumé — du YAML au noyau</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>Pod spec (YAML)          kubelet              noyau Linux
─────────────────   ──────────────────   ──────────────────────
resources:          crée le cgroup       /sys/fs/cgroup/
  requests:         écrit les limites      kubepods/burstable/
    memory: 128Mi   memory.max              pod&lt;uid&gt;/
    cpu: 500m       cpu.max                   memory.max = 128M
  limits:                                     cpu.max = 50000
    memory: 256Mi   ← enforcement →      OOM kill si dépassement
    cpu: 1          kernel throttle CPU   throttle si &gt; quota
</code></pre>
<ul>
<li><code>requests</code> = ce que kubelet <strong>réserve</strong> sur le nœud (scheduling)</li>
<li><code>limits</code> = ce que le <strong>noyau enforced</strong> via cgroup (runtime)</li>
<li>Sans limits → BestEffort → premier tué en cas de pression mémoire</li>
</ul>
</section>

<h2 id="multi-master--comment-%C3%A7a-marche">Multi-master : comment ça marche ?</h2>
<blockquote>
<p><em>On ne le fait pas dans ce TD — sauf si temps disponible (cf. Partie Bonus)</em></p>
</blockquote>
<p><strong>Méthode normale — <code>--upload-certs</code> (recommandée)</strong></p>
<p>À l'init, <code>--upload-certs</code> chiffre les certificats PKI et les stocke dans un Secret <code>kubeadm-certs</code> (namespace <code>kube-system</code>). Ce Secret expire automatiquement après <strong>2 heures</strong>.</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># Sur master1 — à l&#x27;init du cluster</span>
kubeadm init \
  --control-plane-endpoint=<span class="hljs-string">&quot;&lt;lb&gt;:6443&quot;</span> \
  --upload-certs
<span class="hljs-comment"># La sortie affiche --certificate-key &lt;key&gt; — à conserver pour le join</span>
</code></pre>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># Sur master2 — le flag --control-plane distingue un master d&#x27;un worker</span>
<span class="hljs-comment"># kubeadm télécharge et déchiffre les certs depuis le Secret automatiquement</span>
kubeadm <span class="hljs-built_in">join</span> &lt;lb&gt;:6443 \
  --token &lt;token&gt; \
  --discovery-token-ca-cert-hash sha256:&lt;<span class="hljs-built_in">hash</span>&gt; \
  --control-plane \
  --certificate-key &lt;key&gt;
</code></pre>
</section>

<h2 id="multi-master--fallback--copie-manuelle-des-certs">Multi-master — fallback : copie manuelle des certs</h2>
<p><strong>Si <code>--upload-certs</code> oublié ou Secret expiré (2h)</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># Régénérer la clé sans relancer kubeadm init :</span>
kubeadm init phase upload-certs --upload-certs
<span class="hljs-comment"># → affiche un nouveau --certificate-key valable 2h</span>
</code></pre>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># Ou copie manuelle des 6 fichiers PKI master1 → master2</span>
<span class="hljs-keyword">for</span> f <span class="hljs-keyword">in</span> ca.crt ca.key sa.pub sa.key front-proxy-ca.crt front-proxy-ca.key; <span class="hljs-keyword">do</span>
  scp /etc/kubernetes/pki/<span class="hljs-variable">$f</span> root@master2:/etc/kubernetes/pki/
<span class="hljs-keyword">done</span>
scp /etc/kubernetes/pki/etcd/ca.{crt,key} root@master2:/etc/kubernetes/pki/etcd/
kubeadm <span class="hljs-built_in">join</span> &lt;lb&gt;:6443 --token &lt;token&gt; \
  --discovery-token-ca-cert-hash sha256:&lt;<span class="hljs-built_in">hash</span>&gt; --control-plane
</code></pre>
<p><strong>Dans les deux cas :</strong> kubeadm installe <code>kube-apiserver</code>, <code>kube-scheduler</code>, <code>kube-controller-manager</code> et ajoute ce nœud comme membre etcd.</p>

<h2 id="peut-on-promouvoir-un-worker-en-master">Peut-on promouvoir un worker en master ?</h2>
<blockquote>
<p><em>Question fréquente : &quot;j'ai 1 master + 2 workers, puis-je transformer les workers ?&quot;</em></p>
</blockquote>
<p><strong>Non, kubeadm n'a pas de commande de promotion.</strong> Deux blocages :</p>
<p><strong>1. Le certificat API server est figé à l'init</strong></p>
<ul>
<li>Sans <code>--control-plane-endpoint</code>, le cert ne couvre que l'IP du master d'origine → reset obligatoire</li>
</ul>
<p><strong>2. Si <code>--control-plane-endpoint</code> était présent</strong>, on peut faire un &quot;reset + rejoin&quot; :</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">kubectl drain worker1 --ignore-daemonsets --delete-emptydir-data
kubeadm reset &amp;&amp; <span class="hljs-built_in">rm</span> -rf /etc/kubernetes /var/lib/etcd
kubeadm <span class="hljs-built_in">join</span> &lt;lb&gt;:6443 --token ... --control-plane --certificate-key &lt;key&gt;
</code></pre>
<p><strong>La décision HA doit être prise au <code>kubeadm init</code>.</strong> Après, c'est un reset, pas une promotion.</p>
</section>

<h2 id="service-type-loadbalancer--le-probl%C3%A8me-sur-kubeadm">Service type LoadBalancer — le problème sur kubeadm</h2>
<h3 id="sur-un-cluster-kubeadm-bare-metal">Sur un cluster kubeadm bare metal</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash">kubectl expose deploy mon-app --<span class="hljs-built_in">type</span>=LoadBalancer --port=80
kubectl get svc mon-app
<span class="hljs-comment"># NAME      TYPE           CLUSTER-IP    EXTERNAL-IP   PORT</span>
<span class="hljs-comment"># mon-app   LoadBalancer   10.96.0.42    &lt;pending&gt;     80/TCP</span>
</code></pre>
<p><code>&lt;pending&gt;</code> indéfiniment — kubeadm n'a pas de cloud provider pour provisionner un LB</p>
<h3 id="pourquoi-1">Pourquoi ?</h3>
<ul>
<li><code>Service type:LoadBalancer</code> délègue au <strong>cloud-controller-manager</strong></li>
<li>Sur kubeadm DIY : aucun cloud-ccm configuré → l'EXTERNAL-IP ne sera jamais assignée</li>
<li>Sur SKS : le cloud-ccm Exoscale provisionne <strong>automatiquement</strong> un NLB Exoscale</li>
</ul>
<p><strong>Solutions sur kubeadm :</strong> MetalLB · kube-vip · NodePort + LB externe</p>

<h2 id="la-limite-kubeadm--ce-quon-a-appris">La limite kubeadm — ce qu'on a appris</h2>
<p>Bilan du TP kubeadm face à l'intégration cloud native :</p>
<table>
<thead>
<tr>
<th>Ce qu'on maîtrise</th>
<th>Ce qui manque</th>
</tr>
</thead>
<tbody>
<tr>
<td>✓ Bootstrap du cluster</td>
<td>✗ Service <code>type:LoadBalancer</code></td>
</tr>
<tr>
<td>✓ CNI, RBAC, Upgrades</td>
<td>✗ Provisioning automatique NLB</td>
</tr>
<tr>
<td>✓ Static pods, kubelet</td>
<td>✗ Node lifecycle cloud (Instance Pool)</td>
</tr>
<tr>
<td>✓ CCM installé et authentifié</td>
<td>✗ Backend cloud compatible</td>
</tr>
</tbody>
</table>
<p><strong>Ce n'est pas un bug — c'est une frontière architecturale.</strong></p>
<p>kubeadm est fait pour contrôler chaque composant.<br />
Les clouds managés sont faits pour abstraire cette complexité.</p>
<blockquote>
<p>Vous avez maintenant la compréhension interne pour <strong>opérer SKS intelligemment</strong><br />
— et pour savoir exactement ce qu'il fait à votre place.</p>
</blockquote>
</section>

<h2 id="d%C3%A9mo-sks--instructeur">Démo SKS — Instructeur</h2>
<h3 id="%C3%A9tapes-d%C3%A9mo-live-7-min">Étapes démo live (7 min)</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># 1. Créer le cluster SKS</span>
exo compute sks create tp-k8s --zone de-fra-1 \
  --version 1.30 --node-pools workers,2

<span class="hljs-comment"># 2. Récupérer le kubeconfig</span>
exo compute sks kubeconfig tp-k8s admin \
  --zone de-fra-1 &gt; ~/.kube/config-sks

<span class="hljs-comment"># 3. Vérifier</span>
KUBECONFIG=~/.kube/config-sks kubectl get nodes
</code></pre>
<h3 id="ce-que-les-%C3%A9tudiants-observent">Ce que les étudiants observent</h3>
<ul>
<li>Cluster prêt en ~3 min (vs ~30 min avec kubeadm)</li>
<li>Control plane invisible — abstrait</li>
<li><code>kubectl get nodes</code> ne montre que les workers</li>
</ul>
</section>

<h2 id="sks--mono-zone--la-limite-%C3%A0-conna%C3%AEtre">SKS — mono-zone : la limite à connaître</h2>
<h3 id="sks-est-strictement-mono-zone">SKS est strictement mono-zone</h3>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>exo compute sks create tp-k8s --zone de-fra-1 ...
                                       ↑
                               une seule zone
</code></pre>
<ul>
<li>Le control plane SKS tourne dans une zone Exoscale (<code>de-fra-1</code>, <code>ch-gva-2</code>, etc.)</li>
<li>Les node pools sont liés à cette même zone</li>
<li><strong>Pas de workers dans une autre zone</strong> dans le même cluster SKS</li>
<li>Si la zone tombe → cluster indisponible</li>
</ul>
<h3 id="comparaison-avec-les-autres-providers">Comparaison avec les autres providers</h3>
<table>
<thead>
<tr>
<th>Provider</th>
<th>Multi-zone natif</th>
</tr>
</thead>
<tbody>
<tr>
<td>GKE / EKS / AKS</td>
<td>✓ nœuds sur plusieurs AZ dans un cluster</td>
</tr>
<tr>
<td><strong>SKS Exoscale</strong></td>
<td>✗ mono-zone par design</td>
</tr>
<tr>
<td>kubeadm DIY</td>
<td>✓ possible si VMs dans plusieurs zones</td>
</tr>
</tbody>
</table>
<h3 id="strat%C3%A9gie-ha-sur-exoscale">Stratégie HA sur Exoscale</h3>
<ul>
<li>Plusieurs clusters SKS dans des zones différentes + outil multi-cluster (Liqo, Submariner)</li>
<li>Ou kubeadm multi-zone avec VMs Exoscale réparties manuellement</li>
</ul>
</section>

<h2 id="cluster-hybride-sks--kubeadm-on-prem">Cluster hybride SKS + kubeadm on-prem ?</h2>
<h3 id="non--pas-nativement-possible">Non — pas nativement possible</h3>
<p>SKS ne permet pas de joindre des nœuds extérieurs à son control plane :</p>
<table>
<thead>
<tr>
<th>Obstacle</th>
<th>Raison</th>
</tr>
</thead>
<tbody>
<tr>
<td>Tokens kubeadm join</td>
<td>Non exposés par SKS</td>
</tr>
<tr>
<td>CA privée du control plane</td>
<td>Gérée par Exoscale, inaccessible</td>
</tr>
<tr>
<td>Node pools SKS</td>
<td>Exclusivement des instances Exoscale</td>
</tr>
<tr>
<td>API server</td>
<td>Non configuré pour accepter des kubelets externes</td>
</tr>
</tbody>
</table>
<h3 id="alternatives-pour-du-vrai-hybride">Alternatives pour du vrai hybride</h3>
<ul>
<li><strong>Liqo</strong> — peering de clusters, partage de capacité entre K8s distincts</li>
<li><strong>Submariner</strong> — connectivité réseau cross-cluster (pod CIDR routable entre clusters)</li>
<li><strong>Skupper</strong> — service mesh multi-cluster via proxy, sans VPN</li>
</ul>
<blockquote>
<p>L'hybride en production = <strong>deux clusters séparés</strong> reliés par un outil multi-cluster,<br />
pas un seul cluster avec des nœuds sur deux infrastructures</p>
</blockquote>
</section>

<h2 id="pourquoi-observer-le-cluster">Pourquoi observer le cluster ?</h2>
<table>
<thead>
<tr>
<th>Couche</th>
<th>Quoi mesurer</th>
<th>Composant</th>
</tr>
</thead>
<tbody>
<tr>
<td><strong>Nodes</strong></td>
<td>CPU, RAM, disque, réseau</td>
<td><code>node-exporter</code> (DaemonSet)</td>
</tr>
<tr>
<td><strong>Control plane</strong></td>
<td>API latence, etcd leader, scheduler queue</td>
<td>métriques internes</td>
</tr>
<tr>
<td><strong>Workloads</strong></td>
<td>pods running/pending, replicas, PVCs</td>
<td><code>kube-state-metrics</code></td>
</tr>
<tr>
<td><strong>Containers</strong></td>
<td>CPU/RAM par container, restarts</td>
<td><code>cAdvisor</code> (intégré kubelet)</td>
</tr>
</tbody>
</table>
<ul>
<li>Ce chapitre = <strong>observabilité infra du cluster</strong></li>
<li>Pas de tracing applicatif (OpenTelemetry = formation séparée)</li>
<li>Stack : <strong>kube-prometheus-stack</strong> — chart Helm tout-en-un officiel</li>
</ul>
</section>

<h2 id="installation--helm">Installation — Helm</h2>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># Ajouter le repo Prometheus Community</span>
helm repo add prometheus-community \
  https://prometheus-community.github.io/helm-charts
helm repo update

<span class="hljs-comment"># Installer la stack complète dans le namespace monitoring</span>
helm install kube-prom \
  prometheus-community/kube-prometheus-stack \
  --namespace monitoring --create-namespace \
  --<span class="hljs-built_in">set</span> grafana.adminPassword=admin \
  --<span class="hljs-built_in">set</span> prometheus.prometheusSpec.retention=7d \
  --version 65.1.1    <span class="hljs-comment"># version stable en 2025</span>
</code></pre>
<ul>
<li>Installe en une commande : Prometheus, Grafana, Alertmanager,<br />
node-exporter, kube-state-metrics, Prometheus Operator</li>
<li>CRDs créés automatiquement : <code>ServiceMonitor</code>, <code>PrometheusRule</code>, <code>Alertmanager</code></li>
</ul>
</section>

<td>warning</td>
</tr>
<tr>

<td>critical</td>
</tr>

<h2 id="q1-architecture-du-control-plane">Q1: Architecture du Control Plane</h2>
<h3 id="r%C3%A9ponse-attendue">Réponse attendue</h3>
<ul>
<li><strong>API Server:</strong> Point d'entrée unique, validation, authentification</li>
<li><strong>Scheduler:</strong> Placement des pods sur les nœuds</li>
<li><strong>Controller Manager:</strong> Boucles de contrôle (ReplicaSet, Node, etc.)</li>
<li><strong>etcd:</strong> Base de données distribuée, état du cluster</li>
</ul>
<p><strong>Point bonus:</strong> Communication via API server uniquement</p>
</section>

</ul>

<h2 id="q8-runtimeclass--quand-choisir-quel-runtime">Q8: RuntimeClass — Quand choisir quel runtime</h2>
<h3 id="r%C3%A9ponse-attendue-6">Réponse attendue</h3>
<table>
<thead>
<tr>
<th>Critère</th>
<th>runc</th>
<th>gVisor</th>
</tr>
</thead>
<tbody>
<tr>
<td>Isolation</td>
<td>Kernel hôte partagé</td>
<td>Kernel virtuel par pod</td>
</tr>
<tr>
<td>Performance I/O</td>
<td>Natif</td>
<td>~2-3× overhead</td>
</tr>
<tr>
<td>Code non fiable</td>
<td>Risqué</td>
<td>Recommandé</td>
</tr>
<tr>
<td>Bases de données</td>
<td>OK</td>
<td>Déconseillé</td>
</tr>
</tbody>
</table>
<ul>
<li><strong>runc</strong> par défaut pour la majorité des workloads</li>
<li><strong>gVisor</strong> quand l'isolation prime sur la performance</li>
</ul>
</section>

<h2 id="q9-r%C3%A9seau-priv%C3%A9--sks--architecture-cible">Q9: Réseau privé &amp; SKS — Architecture cible</h2>
<h3 id="r%C3%A9ponse-attendue-7">Réponse attendue</h3>
<table>
<thead>
<tr>
<th>Scenario</th>
<th>Architecture recommandée</th>
</tr>
</thead>
<tbody>
<tr>
<td>Lab éphémère (cours)</td>
<td>VMs public + security group</td>
</tr>
<tr>
<td>Formation persistante</td>
<td>VMs + réseau privé Exoscale</td>
</tr>
<tr>
<td>Prod petite équipe</td>
<td>SKS + réseau privé intégré</td>
</tr>
<tr>
<td>Apprentissage K8s</td>
<td>kubeadm (visibilité totale)</td>
</tr>
</tbody>
</table>
<ul>
<li><strong>Réseau privé</strong> isole etcd/kubelet de l'exposition internet</li>
<li><strong>SKS</strong> sacrifie la visibilité interne pour la simplicité opérationnelle</li>
<li>En prod: les deux ne sont pas exclusifs (SKS avec private network)</li>
</ul>
</section>

<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># État du cluster</span>

kubectl get pods --all-namespaces

<span class="hljs-comment"># Debugging</span>
kubectl describe &lt;resource&gt; &lt;name&gt;
kubectl logs &lt;pod&gt;
kubectl <span class="hljs-built_in">exec</span> -it &lt;pod&gt; -- /bin/bash

<span class="hljs-comment"># Maintenance</span>
kubectl drain &lt;node&gt; --ignore-daemonsets
kubectl uncordon &lt;node&gt;
kubectl cordon &lt;node&gt;
</code></pre>

<h2 id="bonus-ha--contexte-et-objectif">Bonus HA — Contexte et objectif</h2>
<blockquote>
<p><em>Dernier exercice avant suppression du cluster — pas une pratique de prod</em></p>
</blockquote>
<p><strong>Situation de départ :</strong> 1 master + 2 workers, initialisé <strong>sans</strong> <code>--control-plane-endpoint</code></p>
<p><strong>Ce qu'on va faire :</strong></p>
<ul>
<li>Réinitialiser le master <strong>avec</strong> <code>--control-plane-endpoint</code> et <code>--upload-certs</code></li>
<li>Réinitialiser chaque worker et le rejoindre en tant que <strong>control plane</strong></li>
<li>Retirer les taints <code>NoSchedule</code> pour que chaque nœud cumule les deux rôles</li>
</ul>
<p><strong>Pourquoi ce n'est pas de la prod :</strong></p>
<ul>
<li>L'endpoint pointe sur l'IP du master → ce nœud reste un SPOF</li>
<li>En prod : LB devant les 3 API servers, etcd séparé sur disques rapides</li>
<li>Ici : on démontre le mécanisme, pas l'architecture cible</li>
</ul>
<p><strong>Ce qu'on apprend :</strong></p>
<ul>
<li>La décision HA doit être prise <strong>au <code>kubeadm init</code></strong> — pas rétroactivement</li>
<li>kubeadm ne &quot;promeut&quot; pas — il reset + rejoint</li>
<li>etcd passe de 1 à 3 membres → quorum réel</li>
</ul>
</section>

<h2 id="bonus-ha--script-00--r%C3%A9initialisation-master">Bonus HA — Script 00 : réinitialisation master</h2>
<p><strong><code>./00-reinit-master.sh</code></strong> — sur le master</p>
<p>Ce que fait le script :</p>
<ol>
<li>Draine les workers (<code>kubectl drain</code>)</li>
<li><code>kubeadm reset -f</code> + nettoyage iptables</li>
<li><code>kubeadm init --control-plane-endpoint=&lt;master-ip&gt;:6443 --upload-certs</code></li>
<li>Réinstalle Calico (VXLAN)</li>
<li>Génère <code>/tmp/ha-join-info.sh</code> avec token, hash et certificate-key</li>
</ol>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># Contenu de /tmp/ha-join-info.sh généré automatiquement</span>
MASTER_IP=<span class="hljs-string">&quot;10.0.0.10&quot;</span>
JOIN_TOKEN=<span class="hljs-string">&quot;abcdef.0123456789abcdef&quot;</span>
DISCOVERY_HASH=<span class="hljs-string">&quot;sha256:abc123...&quot;</span>
CERTIFICATE_KEY=<span class="hljs-string">&quot;def456...&quot;</span>
</code></pre>
<p><strong>Point instructeur :</strong> le <code>--certificate-key</code> expire après <strong>2h</strong>. Si les workers rejoignent après ce délai, relancer <code>kubeadm init phase upload-certs --upload-certs</code> sur le master.</p>
</section>

<h2 id="bonus-ha--script-01--promotion-des-workers">Bonus HA — Script 01 : promotion des workers</h2>
<p><strong><code>./01-promote-worker.sh</code></strong> — sur chaque worker (après copie de <code>ha-join-info.sh</code>)</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># Sur le master : copier le fichier vers chaque worker</span>
scp /tmp/ha-join-info.sh root@&lt;worker1-ip&gt;:/tmp/
scp /tmp/ha-join-info.sh root@&lt;worker2-ip&gt;:/tmp/
</code></pre>
<p>Ce que fait le script sur chaque worker :</p>
<ol>
<li><code>kubeadm reset -f</code> + nettoyage</li>
<li><code>kubeadm join --control-plane --certificate-key</code> (lit <code>ha-join-info.sh</code>)</li>
<li>Configure <code>~/.kube/config</code> → kubectl disponible sur le worker devenu master</li>
</ol>
<p><strong>Ce qui se passe dans etcd :</strong></p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code>Avant  : 1 membre  → leader unique, pas de tolérance aux pannes
Après  : 3 membres → quorum à 2, tolère la perte d'1 nœud
</code></pre>
</section>

<h2 id="bonus-ha--scripts-02-et-03">Bonus HA — Scripts 02 et 03</h2>
<p><strong><code>./02-allow-scheduling.sh</code></strong> — retire le taint <code>NoSchedule</code> des control planes</p>
<pre is="marp-pre" data-auto-scaling="downscale-only"><code class="language-bash"><span class="hljs-comment"># Équivalent manuel</span>
kubectl taint node master  node-role.kubernetes.io/control-plane:NoSchedule-
kubectl taint node worker1 node-role.kubernetes.io/control-plane:NoSchedule-
kubectl taint node worker2 node-role.kubernetes.io/control-plane:NoSchedule-
</code></pre>
<p>Sans ce retrait, les pods applicatifs ne s'y scheduleraient pas — seuls les pods système (DaemonSets avec toleration) y tournent.</p>
