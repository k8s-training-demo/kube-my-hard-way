apiVersion: v1
kind: Pod
metadata:
  name: pod-with-toleration
  labels:
    app: test-scheduling
    workload: gpu
spec:
  containers:
  - name: nginx
    image: nginx:alpine
    resources:
      requests:
        cpu: 100m
        memory: 128Mi
  tolerations:
  # Tolère le taint gpu=true:NoSchedule
  - key: "gpu"
    operator: "Equal"
    value: "true"
    effect: "NoSchedule"
  # Tolère le taint environment=production:NoExecute
  - key: "environment"
    operator: "Equal"
    value: "production"
    effect: "NoExecute"
  restartPolicy: Always
